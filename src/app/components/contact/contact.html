<section class="contact" id="contactos">
  <div class="contact-inner">
    <div class="contact-info fade-in">
      <p class="section-tag" style="color:var(--gold)">Hablemos</p>
      <h2 class="section-title">Contacto</h2>
      <p class="contact-intro">Desde Cuba hacia el mundo. Si tienes una marca que merece legado, estamos listos para construirlo juntos.</p>
      <div class="contact-items">
        <div class="contact-item">
          <div class="contact-item-icon">
            <svg viewBox="0 0 24 24">
              <path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/>
              <polyline points="22,6 12,13 2,6"/>
            </svg>
          </div>
          <div>
            <div class="contact-item-label">Correo</div>
            <div class="contact-item-value">galbat.agency@gmail.com</div>
          </div>
        </div>
        <div class="contact-item">
          <div class="contact-item-icon">
            <svg viewBox="0 0 24 24">
              <path d="M22 16.92v3a2 2 0 01-2.18 2 19.79 19.79 0 01-8.63-3.07A19.5 19.5 0 013.07 9.81a19.79 19.79 0 01-3.07-8.67A2 2 0 012 .18h3a2 2 0 012 1.72c.127.96.361 1.903.7 2.81a2 2 0 01-.45 2.11L6.09 7.91a16 16 0 006 6l1.27-1.27a2 2 0 012.11-.45 12.84 12.84 0 002.81.7A2 2 0 0122 16.92z"/>
            </svg>
          </div>
          <div>
            <div class="contact-item-label">Teléfono</div>
            <div class="contact-item-value">+53 55956206</div>
          </div>
        </div>
        <!-- <div class="contact-item">
          <div class="contact-item-icon">
            <svg viewBox="0 0 24 24">
              <circle cx="12" cy="12" r="10"/>
              <line x1="2" y1="12" x2="22" y2="12"/>
              <path d="M12 2a15.3 15.3 0 014 10 15.3 15.3 0 01-4 10 15.3 15.3 0 01-4-10 15.3 15.3 0 014-10z"/>
            </svg>
          </div>
           <div>
            <div class="contact-item-label">Sitio Web</div>
            <div class="contact-item-value">www.galbatagency.com</div>
          </div>
        </div>-->
        <div class="contact-item">
          <div class="contact-item-icon">
            <svg viewBox="0 0 24 24">
              <path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0118 0z"/>
              <circle cx="12" cy="10" r="3"/>
            </svg>
          </div>
          <div>
            <div class="contact-item-label">Dirección</div>
            <div class="contact-item-value">Calle 25 entre 8 y 10, Vedado, La Habana. Cuba</div>
          </div>
        </div>
      </div>
    </div>
    <div class="contact-form-side fade-in">
      <p class="section-tag">Escríbenos</p>
      <h2 class="section-title">¿Tienes un proyecto?</h2>
      <div class="section-line"></div>
      <div class="form-group">
        <label>Nombre completo</label>
        <input type="text" placeholder="Tu nombre" [(ngModel)]="formData.name">
      </div>
      <div class="form-group">
        <label>Correo electrónico</label>
        <input type="email" placeholder="correo@ejemplo.com" [(ngModel)]="formData.email">
      </div>
      <div class="form-group">
        <label>Empresa o marca</label>
        <input type="text" placeholder="Nombre de tu empresa" [(ngModel)]="formData.company">
      </div>
      <div class="form-group">
        <label>Mensaje</label>
        <textarea rows="4" placeholder="Cuéntanos sobre tu proyecto..." [(ngModel)]="formData.message"></textarea>
      </div>
      <div *ngIf="statusMessage" [class]="submitStatus === 'success' ? 'form-status success' : submitStatus === 'error' ? 'form-status error' : 'form-status'">
        {{ statusMessage }}
      </div>
      <button class="form-submit" (click)="onSubmit()" [disabled]="submitStatus === 'sending'">
        {{ submitStatus === 'sending' ? 'Enviando...' : 'Enviar mensaje' }}
      </button>
    </div>
  </div>
</section>
